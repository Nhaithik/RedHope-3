<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dashboard | Red Hope</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<script src="shared.js"></script>
<script src="notifications.js"></script>
<script src="layout.js"></script>
<script>
const user = renderLayout('Dashboard', 'dashboard.html');
</script>

<!-- Page Content injected into .content by layout -->
<div id="page-body" style="display:none;">

  <!-- Urgent Banner -->
  <div id="urgent-banner" class="urgent-banner" style="display:none;">
    <div style="font-size:1.8rem;">⚠️</div>
    <div style="flex:1;">
      <strong id="banner-urgency" style="font-size:.75rem;letter-spacing:1px;text-transform:uppercase;"></strong>
      <div id="banner-text" style="font-weight:600;margin:2px 0;font-size:1rem;"></div>
      <div style="font-size:.82rem;color:var(--muted);">Can you help? View all urgent requests.</div>
    </div>
    <a href="urgent_requests.html" class="btn-sm" style="background:var(--red);color:white;">View All</a>
  </div>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="stat-card"><div class="val" id="dash-blood-type" style="color:var(--red);">N/A</div><div class="lbl">My Blood Type</div></div>
    <div class="stat-card"><div class="val" id="dash-points" style="color:var(--gold);">0</div><div class="lbl">Reward Points</div></div>
    <div class="stat-card"><div class="val" id="dash-donations" style="color:var(--green);">0</div><div class="lbl">Total Donations</div></div>
    <div class="stat-card"><div class="val" id="dash-streak" style="color:var(--blue);">🔥 0</div><div class="lbl">Day Streak</div></div>
  </div>

  <!-- Chart -->
  <div class="glass-card">
    <div class="section-title">Donation Activity (This Year)</div>
    <canvas id="donationChart" height="80"></canvas>
  </div>

  <!-- Quick Actions -->
  <div class="glass-card">
    <div class="section-title">Quick Actions</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button class="btn-sm" style="background:var(--red);color:white;padding:10px 18px;" onclick="openModal('log-modal')"><i class="fa-solid fa-plus"></i> Log a Donation</button>
      <a href="donor_search.html" class="btn-sm" style="background:var(--red-light);color:var(--red-dark);padding:10px 18px;"><i class="fa-solid fa-magnifying-glass"></i> Find Donors</a>
      <a href="urgent_requests.html" class="btn-sm" style="background:#FEF3C7;color:#92400E;padding:10px 18px;"><i class="fa-solid fa-triangle-exclamation"></i> Urgent Requests</a>
      <a href="blood_availability.html" class="btn-sm" style="background:#D1FAE5;color:#065F46;padding:10px 18px;"><i class="fa-solid fa-droplet"></i> Blood Availability</a>
    </div>
  </div>
</div>

<!-- Log Donation Modal -->
<div class="modal-overlay" id="log-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('log-modal')">×</button>
    <h3 style="font-family:'Playfair Display',serif;color:var(--red);margin-bottom:5px;"><i class="fa-solid fa-heart"></i> Log a Donation</h3>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:20px;">Record your donation and earn +500 points!</p>
    <div class="form-row">
      <div class="form-group"><label>Donation Type</label>
        <select id="log-type" onchange="document.getElementById('organ-div').style.display=this.value==='organ'?'block':'none'">
          <option value="blood">🩸 Blood</option><option value="organ">🩺 Organ Pledge</option><option value="platelet">🟡 Platelet</option><option value="plasma">💙 Plasma</option>
        </select>
      </div>
      <div class="form-group"><label>Blood Group</label>
        <select id="log-bg"><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
      </div>
    </div>
    <div class="form-group" id="organ-div" style="display:none;"><label>Organ Donated</label><input type="text" id="log-organ" placeholder="e.g. Kidney, Liver"/></div>
    <div class="form-row">
      <div class="form-group"><label>Location / Hospital</label><input type="text" id="log-loc" placeholder="City Medical Center"/></div>
      <div class="form-group"><label>Units</label><input type="number" id="log-units" value="1" min="1" max="10"/></div>
    </div>
    <div class="form-group"><label>Date</label><input type="date" id="log-date"/></div>
    <div class="form-group"><label>Notes (optional)</label><input type="text" id="log-notes" placeholder="Any notes..."/></div>
    <div style="background:#D1FAE5;border:1px solid #6EE7B7;padding:10px 14px;border-radius:8px;font-size:.88rem;color:#065F46;margin-bottom:16px;"><i class="fa-solid fa-star"></i> You'll earn <strong>+500 points</strong>!</div>
    <button class="btn-primary" onclick="logDonation()"><i class="fa-solid fa-heart"></i> Log Donation</button>
  </div>
</div>

<script>
// Move page body into layout content
document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('main-content');
  const body = document.getElementById('page-body');
  if(content && body){ content.innerHTML = body.innerHTML; }

  // Set default date
  document.getElementById('log-date').value = new Date().toISOString().split('T')[0];

  // Load data
  document.getElementById('dash-blood-type').textContent = user.blood_group || 'N/A';
  document.getElementById('dash-points').textContent = (user.points||0).toLocaleString();
  const donations = (DB.get('donations')||[]).filter(d=>d.user_id===user.id);
  document.getElementById('dash-donations').textContent = donations.length;
  document.getElementById('dash-streak').textContent = '🔥 ' + (user.streak||0);

  // Urgent banner
  const reqs = (DB.get('urgent_requests')||[]).filter(r=>r.active);
  if(reqs.length > 0){
    const r = reqs[0];
    const col = r.urgency==='critical'?'#DC2626':r.urgency==='high'?'#D97706':'#CA8A04';
    const banner = document.getElementById('urgent-banner');
    banner.style.display='flex'; banner.style.borderLeftColor=col;
    document.getElementById('banner-urgency').textContent = r.urgency + ' urgent need';
    document.getElementById('banner-urgency').style.color = col;
    document.getElementById('banner-text').innerHTML = `<span style="color:${col};font-size:1.2rem;font-weight:800;">${r.blood_group}</span> needed at ${r.hospital}, ${r.city}`;
  }

  // Set blood group in log modal
  const bgSel = document.getElementById('log-bg');
  if(bgSel && user.blood_group){ bgSel.value = user.blood_group; }

  // Chart
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const counts=new Array(12).fill(0);
  donations.forEach(d=>{const m=new Date(d.date).getMonth();if(!isNaN(m))counts[m]++;});
  new Chart(document.getElementById('donationChart').getContext('2d'),{
    type:'line',
    data:{labels:months,datasets:[{label:'Donations',data:counts,borderColor:'#DC2626',backgroundColor:'rgba(220,38,38,.1)',borderWidth:3,tension:.4,fill:true}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(200,200,200,.1)'}},x:{grid:{display:false}}}}
  });
});

function logDonation(){
  const loc = document.getElementById('log-loc').value.trim();
  const date = document.getElementById('log-date').value;
  if(!loc||!date){alert('Location and date are required.');return;}
  const donations = DB.get('donations')||[];
  donations.push({
    id:Date.now(), user_id:user.id,
    type:document.getElementById('log-type').value,
    blood_group:document.getElementById('log-bg').value,
    location:loc, units:parseInt(document.getElementById('log-units').value)||1,
    date, notes:document.getElementById('log-notes').value.trim(),
    organ_donated:document.getElementById('log-organ')?.value.trim()||''
  });
  DB.set('donations',donations);
  addPoints(user.id,500);
  notifyDonationLogged(user.id, document.getElementById('log-type').value, document.getElementById('log-bg').value);
  // Update blood availability
  const avail=DB.get('blood_avail')||[];
  const ba=avail.find(a=>a.blood_group===document.getElementById('log-bg').value);
  if(ba){ba.units_available=Math.min(ba.units_available+1,ba.units_needed+20);}
  DB.set('blood_avail',avail);
  closeModal('log-modal');
  alert('✅ Donation logged! You earned +500 points.');
  window.location.reload();
}

document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
</script>
</body>
</html>
